name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event.issue.pull_request && contains(github.event.comment.body, '/review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Check org membership
        id: auth
        run: |
          ASSOC="${{ github.event.comment.author_association }}"
          if [[ "$ASSOC" == "MEMBER" || "$ASSOC" == "OWNER" || "$ASSOC" == "COLLABORATOR" ]]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            echo "::warning::User ${{ github.actor }} ($ASSOC) is not authorized to trigger reviews"
          fi

      - name: React to unauthorized user
        if: steps.auth.outputs.authorized != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="-1" || true

      - name: Acknowledge review request
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="eyes" || true

      - name: Checkout repository
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout PR branch and fetch base
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh pr checkout "$PR_NUMBER"
          BASE=$(gh pr view "$PR_NUMBER" --json baseRefName -q .baseRefName)
          git fetch origin "$BASE" --depth=1
          echo "BASE_BRANCH=origin/$BASE" >> "$GITHUB_ENV"

      - name: Checkout plugin marketplace
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/checkout@v6
        with:
          repository: KubeRocketCI/claude-plugins
          path: ./claude-plugins

      - name: Run Claude review
        id: review
        if: steps.auth.outputs.authorized == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "/review"
          use_sticky_comment: true
          show_full_output: true  # TODO: remove after debugging
          plugin_marketplaces: "./claude-plugins"
          plugins: |
            krci-general@kuberocketci-plugins
            krci-fullstack@kuberocketci-plugins
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
            BASE_BRANCH: ${{ env.BASE_BRANCH }}

            Review this pull request. Read CLAUDE.md for project conventions.

            ## Step 0 — Gather changed files

            The repo is checked out on the PR branch with full history.
            Run `git diff --name-only ${{ env.BASE_BRANCH }}` to get the list of changed files.
            Then read each changed file using the Read tool.
            Do NOT use `gh pr diff` — it fails on large PRs.

            ## Step 1 — Parallel review

            Use the Agent tool to launch 3 code-reviewer agents in parallel
            (subagent_type: "krci-general:code-reviewer", run_in_background: true).
            Include the list of changed files and tell each agent to use
            `git diff ${{ env.BASE_BRANCH }} -- <file>` and Read tool to review files:

            1. "Review for bugs, logic errors, security vulnerabilities, race conditions,
               and functional correctness. Changed files: [LIST]. Use `git diff ${{ env.BASE_BRANCH }} -- <file>`
               and Read tool to examine each file."
            2. "Review for simplicity, DRY violations, code elegance,
               and readability issues. Changed files: [LIST]. Use `git diff ${{ env.BASE_BRANCH }} -- <file>`
               and Read tool to examine each file."
            3. "Review for project convention violations (check CLAUDE.md),
               architectural consistency, naming patterns, and import organization.
               Changed files: [LIST]. Use `git diff ${{ env.BASE_BRANCH }} -- <file>`
               and Read tool to examine each file."

            ## Step 2 — Validate with domain expertise

            Send all findings to a fullstack-dev agent
            (subagent_type: "krci-fullstack:fullstack-dev") to validate against
            project patterns (React/TypeScript/Radix UI/tRPC/form/table/K8s).
            Reject false positives that are actually correct project patterns.
            Keep only issues with confidence >= 80.

            ## Step 3 — Post results

            For each validated issue: post an inline comment on the exact line
            with severity (critical/important), confidence score, and fix suggestion.

            Then post one summary comment using this exact template:

            ```
            ## Review Summary

            **Issues found**: N critical, N important

            ### Critical Issues
            - `file:line` — description (confidence: N)

            ### Important Issues
            - `file:line` — description (confidence: N)

            ### Verdict
            **APPROVE** or **REQUEST CHANGES** — one sentence rationale
            ```

            Omit empty sections. If no issues survived validation, post:

            ```
            ## Review Summary

            No issues found. Code looks good.

            ### Verdict
            **APPROVE**
            ```

            If the user included extra instructions after /review, follow those too.
            Do not execute /review as a slash command — this prompt IS the review.

            IMPORTANT: When posting summary via `gh pr comment`, use a heredoc to pass
            the body safely:
              gh pr comment NUMBER --body "$(cat <<'ENDOFBODY'
              ... markdown content ...
              ENDOFBODY
              )"
            Do NOT write temp files — the sandbox blocks writes outside the working directory,
            and the Write tool is not in the allowed tools list.
          claude_args: |
            --max-turns 10
            --allowedTools "Agent,Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*),Bash(git fetch:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(pnpm:*),mcp__github_inline_comment__create_inline_comment"

      - name: Post review metrics
        if: always() && steps.review.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          EXEC_FILE="${{ steps.review.outputs.execution_file }}"
          if [ -f "$EXEC_FILE" ]; then
            COST=$(jq -r '.[-1].total_cost_usd // "N/A"' "$EXEC_FILE")
            TURNS=$(jq -r '.[-1].num_turns // "N/A"' "$EXEC_FILE")
            DENIALS=$(jq -r '(.[-1].permission_denials // []) | length' "$EXEC_FILE")
            STATUS=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE")
            gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ### Review Metrics
          | Metric | Value |
          |--------|-------|
          | Status | \`$STATUS\` |
          | Cost | \$$COST |
          | Turns | $TURNS |
          | Permission denials | $DENIALS |
          EOF
          )"
          fi
