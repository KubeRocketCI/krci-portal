packages:
  - apps/*
  - packages/*
syncInjectedDepsAfterScripts:
  - build
injectWorkspacePackages: true

# Supply-chain cooldown: refuse to install any package version published less than
# 7 days ago, so a maliciously-published version is filtered out during the window
# the community typically needs to detect and yank it. Value is in MINUTES.
# Security patches still apply: `pnpm audit --fix` appends fixes to the exclude list.
minimumReleaseAge: 10080

# Security overrides — pin patched versions of vulnerable (mostly transitive) deps.
# Per-major selectors (e.g. minimatch@3) keep older consumers on a compatible line.
# Re-check with `pnpm audit` after dependency changes.
overrides:
  seroval: ">=1.4.1"
  seroval-plugins: ">=1.4.1"
  fastify: ">=5.8.5"
  dompurify: ">=3.4.0"
  rollup: ">=4.59.0"
  vite@6: ">=6.4.2 <7"
  h3@1: ">=1.15.9 <2"
  fast-uri: ">=3.1.2"
  immutable: ">=5.1.5"
  flatted: ">=3.4.2"
  lodash: ">=4.18.0"
  "@isaacs/brace-expansion": ">=5.0.1"
  brace-expansion@1: ">=1.1.13 <2"
  brace-expansion@2: ">=2.0.3 <3"
  minimatch@3: ">=3.1.4 <4"
  minimatch@9: ">=9.0.7 <10"
  minimatch@10: ">=10.2.3 <11"
  picomatch@2: ">=2.3.2 <3"
  picomatch@4: ">=4.0.4 <5"
  ws: ">=8.20.1 <9"
  qs: ">=6.15.2"
  yaml@2: ">=2.8.3 <3"
  postcss: ">=8.5.10"
  ip-address: ">=10.1.1"
  ajv@6: ">=6.14.0 <7"
  ajv@8: ">=8.18.0"
  uuid: ">=11.1.1"
  diff@4: ">=4.0.4 <5"

# Install-script allowlist: only better-sqlite3 (a native binding) may run build
# scripts. Everything else is blocked — malicious postinstall is the #1 attack vector.
allowBuilds:
  better-sqlite3: true
  esbuild: false
  sonar-scanner: false
